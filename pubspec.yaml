name: hamster_app
description: 햄스터 키우기 — 버추얼 햄스터 육성 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 백엔드
  supabase_flutter: ^2.0.0

  # 로컬 캐시
  hive_flutter: ^1.1.0

  # 상태 관리
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # 라우팅
  go_router: ^13.0.0

  # 애니메이션
  rive: ^0.12.0

  # 유틸
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
  fonts: []
